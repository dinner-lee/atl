<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Adaptive Teacher Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <header class="top-nav">
      <div class="logo">
        <span class="logo-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        </span>
        <span class="logo-text">맞춤형 학습분석 대시보드: aTL</span>
      </div>
      
      <button class="hamburger-menu" id="hamburger-btn" onclick="toggleMobileMenu()">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
          <path d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <nav class="main-menu" id="main-menu">
        <button class="nav-item active" data-tab="dashboard" onclick="setView('dashboard')">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
          </span> 대시보드
        </button>
        <button class="nav-item" data-tab="calendar" onclick="setView('calendar')">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
          </span> 캘린더
        </button>
        <button class="nav-item" data-tab="profile" onclick="setView('profile')">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span> 학생 정보 관리
        </button>
      </nav>
      <div class="nav-actions">
        <div class="compact-user-info">
          <span class="user-greeting">김OO 선생님, 안녕하세요.</span>
          <span class="user-subject">국어 교과</span>
          
          <div class="user-profile-dropdown">
            <div class="dropdown-header">
              <div class="dropdown-avatar">김</div>
              <div class="dropdown-info">
                <strong>김OO 선생님</strong>
                <p id="dropdown-class-count">국어 교과 담당 | 총 8개 학급 지도 중</p>
              </div>
            </div>
            <div class="dropdown-actions">
              <button class="settings-btn" onclick="alert('내 정보 수정 설정 창이 열립니다.')">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                내 정보 수정
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="views-wrapper" id="views-wrapper">
        <div class="view-slide" id="view-dashboard"></div>
        <div class="view-slide" id="view-calendar"></div>
        <div class="view-slide" id="view-profile"></div>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
